<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CubeTimer — Speedcubing</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700;800&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060a12;
    --glass: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.08);
    --glass-hover: rgba(255,255,255,0.07);
    --accent: #00e5a0;
    --accent2: #0099ff;
    --accent3: #ff4d6d;
    --text: #e8edf5;
    --muted: rgba(232,237,245,0.4);
    --timer-idle: #e8edf5;
    --timer-hold: #ff4d6d;
    --timer-ready: #00e5a0;
    --timer-running: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    user-select: none;
  }

  /* Animated gradient background */
  .bg-canvas {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 80% 60% at 20% 30%, rgba(0,229,160,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 70%, rgba(0,153,255,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 50% 50%, rgba(255,77,109,0.04) 0%, transparent 70%),
                #060a12;
    animation: bgShift 12s ease-in-out infinite alternate;
  }
  @keyframes bgShift {
    0%   { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(30deg); }
  }

  /* Grid noise overlay */
  .bg-canvas::after {
    content: '';
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  .app {
    position: relative; z-index: 1;
    display: grid;
    grid-template-columns: 1fr 340px;
    grid-template-rows: auto 1fr auto;
    min-height: 100vh;
    gap: 0;
  }

  /* ── Header ── */
  .header {
    grid-column: 1 / -1;
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--glass-border);
    backdrop-filter: blur(20px);
    background: rgba(6,10,18,0.6);
  }
  .logo {
    font-size: 1.1rem; font-weight: 800; letter-spacing: 0.12em;
    text-transform: uppercase;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header-controls { display: flex; gap: 12px; align-items: center; }
  .toggle-btn {
    font-family: 'Syne', sans-serif;
    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 7px 16px;
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    background: var(--glass);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .toggle-btn:hover { background: var(--glass-hover); color: var(--text); }
  .toggle-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,229,160,0.1);
    box-shadow: 0 0 16px rgba(0,229,160,0.15);
  }

  /* ── Main area ── */
  .main {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 32px;
    gap: 32px;
    min-height: calc(100vh - 65px);
  }

  /* Scramble */
  .scramble-box {
    width: 100%; max-width: 620px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 18px 24px;
    backdrop-filter: blur(20px);
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .scramble-box::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent2), transparent);
    opacity: 0.5;
  }
  .scramble-label {
    font-size: 0.65rem; font-weight: 700; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 10px;
  }
  .scramble-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.05rem; font-weight: 400;
    color: var(--text); line-height: 1.7;
    letter-spacing: 0.05em;
  }
  .scramble-moves span {
    display: inline-block;
    padding: 2px 6px; margin: 2px;
    border-radius: 6px;
    transition: color 0.2s, background 0.2s;
  }
  .scramble-moves span.move-R { color: #ff6b6b; }
  .scramble-moves span.move-L { color: #ff9f43; }
  .scramble-moves span.move-U { color: #ffd32a; }
  .scramble-moves span.move-D { color: #a3cb38; }
  .scramble-moves span.move-F { color: #00d2d3; }
  .scramble-moves span.move-B { color: #b388ff; }
  .new-scramble-btn {
    position: absolute; right: 14px; top: 14px;
    width: 28px; height: 28px;
    border: 1px solid var(--glass-border);
    border-radius: 50%;
    background: var(--glass-hover);
    color: var(--muted);
    cursor: pointer;
    font-size: 0.85rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .new-scramble-btn:hover { color: var(--accent); border-color: var(--accent); transform: rotate(90deg); }

  /* Timer */
  .timer-wrapper {
    position: relative;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .timer-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(5rem, 13vw, 10rem);
    font-weight: 800;
    color: var(--timer-idle);
    letter-spacing: -0.02em;
    line-height: 1;
    transition: color 0.15s, text-shadow 0.15s;
    cursor: default;
    text-align: center;
  }
  .timer-display.holding { color: var(--timer-hold); }
  .timer-display.ready   { color: var(--timer-ready); text-shadow: 0 0 40px rgba(0,229,160,0.4); }
  .timer-display.running { color: var(--timer-running); text-shadow: 0 0 30px rgba(255,255,255,0.15); }

  .timer-hint {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--muted);
    transition: color 0.2s;
  }

  /* Inspection countdown */
  .inspection-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 2rem; font-weight: 700;
    color: #ffd32a;
    text-shadow: 0 0 20px rgba(255,211,42,0.4);
    display: none;
    animation: pulse 1s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

  /* ── Sidebar ── */
  .sidebar {
    border-left: 1px solid var(--glass-border);
    background: rgba(6,10,18,0.5);
    backdrop-filter: blur(20px);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  .stats-panel {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--glass-border);
  }
  .panel-title {
    font-size: 0.62rem; font-weight: 700; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 16px;
  }
  .stats-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .stat-card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 12px 14px;
    position: relative; overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    opacity: 0.4;
  }
  .stat-card.best::before  { background: linear-gradient(90deg, var(--accent), transparent); }
  .stat-card.ao5::before   { background: linear-gradient(90deg, var(--accent2), transparent); }
  .stat-card.ao12::before  { background: linear-gradient(90deg, #b388ff, transparent); }
  .stat-card.count::before { background: linear-gradient(90deg, #ffd32a, transparent); }

  .stat-label {
    font-size: 0.6rem; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 6px;
  }
  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem; font-weight: 700;
    color: var(--text);
  }
  .stat-card.best .stat-value  { color: var(--accent); }
  .stat-card.ao5 .stat-value   { color: var(--accent2); }
  .stat-card.ao12 .stat-value  { color: #b388ff; }

  /* Solve list */
  .solves-panel {
    flex: 1; overflow: hidden;
    display: flex; flex-direction: column;
    padding: 16px 20px;
  }
  .solves-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .clear-btn {
    font-family: 'Syne', sans-serif;
    font-size: 0.6rem; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 4px 10px;
    border: 1px solid rgba(255,77,109,0.3);
    border-radius: 10px;
    background: rgba(255,77,109,0.06);
    color: rgba(255,77,109,0.6);
    cursor: pointer;
    transition: all 0.2s;
  }
  .clear-btn:hover { border-color: var(--accent3); color: var(--accent3); background: rgba(255,77,109,0.12); }

  .solves-list {
    flex: 1; overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }
  .solves-list::-webkit-scrollbar { width: 4px; }
  .solves-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .solve-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 10px;
    border-radius: 8px;
    margin-bottom: 4px;
    background: var(--glass);
    border: 1px solid transparent;
    transition: all 0.2s;
    animation: slideIn 0.25s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .solve-item:hover { border-color: var(--glass-border); background: var(--glass-hover); }
  .solve-item.is-best { border-color: rgba(0,229,160,0.25); background: rgba(0,229,160,0.05); }

  .solve-num {
    font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em;
    color: var(--muted); min-width: 28px;
  }
  .solve-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.92rem; font-weight: 700;
    color: var(--text); flex: 1; text-align: center;
  }
  .solve-item.is-best .solve-time { color: var(--accent); }
  .solve-delete {
    width: 20px; height: 20px;
    border: none; border-radius: 4px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.75rem;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: all 0.15s;
  }
  .solve-item:hover .solve-delete { opacity: 1; }
  .solve-delete:hover { background: rgba(255,77,109,0.2); color: var(--accent3); }

  .empty-state {
    text-align: center; padding: 40px 20px;
    color: var(--muted); font-size: 0.78rem;
    line-height: 1.8;
  }
  .empty-state .big { font-size: 2rem; display: block; margin-bottom: 8px; }

  /* Touch zone for mobile */
  .touch-zone {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 45%;
    z-index: 10;
    cursor: pointer;
  }

  /* Mobile layout */
  @media (max-width: 768px) {
    .app {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto 1fr;
    }
    .sidebar {
      border-left: none;
      border-top: 1px solid var(--glass-border);
      grid-row: 3;
    }
    .main { min-height: 50vh; padding: 24px 16px; }
    .touch-zone { display: block; }
    .timer-hint { display: none; }
    .stats-grid { grid-template-columns: repeat(4, 1fr); }
    .solves-panel { max-height: 280px; }
  }

  /* Ripple on stop */
  .ripple {
    position: fixed;
    border-radius: 50%;
    transform: scale(0);
    animation: rippleOut 0.5s linear;
    background: rgba(0,229,160,0.12);
    pointer-events: none;
    z-index: 999;
  }
  @keyframes rippleOut {
    to { transform: scale(4); opacity: 0; }
  }
</style>
</head>
<body>

<div class="bg-canvas"></div>

<div class="app">
  <!-- Header -->
  <header class="header">
    <div class="logo">⬛ CubeTimer</div>
    <div class="header-controls">
      <button class="toggle-btn" id="inspectionToggle">Inspektion 15s</button>
    </div>
  </header>

  <!-- Main -->
  <main class="main">
    <!-- Scramble -->
    <div class="scramble-box">
      <div class="scramble-label">Scramble</div>
      <div class="scramble-text scramble-moves" id="scrambleText">Generiere...</div>
      <button class="new-scramble-btn" id="newScrambleBtn" title="Neues Scramble">↻</button>
    </div>

    <!-- Timer -->
    <div class="timer-wrapper">
      <div class="inspection-display" id="inspectionDisplay">15</div>
      <div class="timer-display" id="timerDisplay">0:00.00</div>
      <div class="timer-hint" id="timerHint">Leertaste halten zum Starten</div>
    </div>
  </main>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="stats-panel">
      <div class="panel-title">Session Statistiken</div>
      <div class="stats-grid">
        <div class="stat-card best">
          <div class="stat-label">Best</div>
          <div class="stat-value" id="statBest">—</div>
        </div>
        <div class="stat-card count">
          <div class="stat-label">Solves</div>
          <div class="stat-value" id="statCount">0</div>
        </div>
        <div class="stat-card ao5">
          <div class="stat-label">Ao5</div>
          <div class="stat-value" id="statAo5">—</div>
        </div>
        <div class="stat-card ao12">
          <div class="stat-label">Ao12</div>
          <div class="stat-value" id="statAo12">—</div>
        </div>
      </div>
    </div>

    <div class="solves-panel">
      <div class="solves-header">
        <div class="panel-title" style="margin:0">Letzte Solves</div>
        <button class="clear-btn" id="clearBtn">Alles löschen</button>
      </div>
      <div class="solves-list" id="solvesList">
        <div class="empty-state">
          <span class="big">🧊</span>
          Noch keine Solves.<br>Halte die Leertaste gedrückt!
        </div>
      </div>
    </div>
  </aside>
</div>

<!-- Mobile touch zone -->
<div class="touch-zone" id="touchZone"></div>

<script>
// ─── Audio ───────────────────────────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function playClick() {
  try {
    if (!audioCtx) audioCtx = new AudioCtx();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.04);
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
  } catch(e) {}
}

// ─── Scramble Generator ───────────────────────────────────────────────────────
const FACES  = ['R','L','U','D','F','B'];
const MODS   = ['', "'", '2'];
const OPPOSITES = { R:'L', L:'R', U:'D', D:'U', F:'B', B:'F' };

function generateScramble(len = 20) {
  const moves = [];
  let lastFace = '', secondLastFace = '';
  while (moves.length < len) {
    const face = FACES[Math.floor(Math.random() * 6)];
    if (face === lastFace) continue;
    if (face === OPPOSITES[lastFace] && face === secondLastFace) continue;
    const mod = MODS[Math.floor(Math.random() * 3)];
    moves.push(face + mod);
    secondLastFace = lastFace;
    lastFace = face;
  }
  return moves;
}

function renderScramble(moves) {
  return moves.map(m => {
    const face = m[0];
    return `<span class="move-${face}">${m}</span>`;
  }).join(' ');
}

function newScramble() {
  const moves = generateScramble(20);
  document.getElementById('scrambleText').innerHTML = renderScramble(moves);
}

// ─── Timer State ──────────────────────────────────────────────────────────────
let solves = [];
let timerState = 'idle'; // idle | holding | ready | inspection | running | stopped
let startTime = 0;
let elapsed = 0;
let rafId = null;
let holdTimer = null;
let inspectionTimer = null;
let inspectionSeconds = 15;
let inspectionEnabled = false;
let holdDuration = 0;
const HOLD_THRESHOLD = 550; // ms

const timerDisplay    = document.getElementById('timerDisplay');
const timerHint       = document.getElementById('timerHint');
const inspectionDisp  = document.getElementById('inspectionDisplay');
const inspectionToggle= document.getElementById('inspectionToggle');
const newScrambleBtn  = document.getElementById('newScrambleBtn');
const clearBtn        = document.getElementById('clearBtn');
const touchZone       = document.getElementById('touchZone');

// ─── Format time ─────────────────────────────────────────────────────────────
function fmt(ms) {
  if (ms === null || ms === undefined) return '—';
  const m = Math.floor(ms / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  const cs = Math.floor((ms % 1000) / 10);
  if (m > 0) return `${m}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
  return `${s}.${String(cs).padStart(2,'0')}`;
}

// ─── Timer loop ───────────────────────────────────────────────────────────────
function tick() {
  elapsed = Date.now() - startTime;
  timerDisplay.textContent = fmt(elapsed);
  rafId = requestAnimationFrame(tick);
}

// ─── Stats ────────────────────────────────────────────────────────────────────
function calcAo(n) {
  if (solves.length < n) return null;
  const recent = solves.slice(-n).map(s => s.ms);
  const sorted = [...recent].sort((a,b) => a-b);
  const trimmed = sorted.slice(1, -1); // remove best and worst
  return trimmed.reduce((a,b) => a+b, 0) / trimmed.length;
}

function updateStats() {
  const count = solves.length;
  document.getElementById('statCount').textContent = count;

  const best = count ? Math.min(...solves.map(s => s.ms)) : null;
  document.getElementById('statBest').textContent = best !== null ? fmt(best) : '—';

  const ao5 = calcAo(5);
  document.getElementById('statAo5').textContent = ao5 !== null ? fmt(ao5) : '—';

  const ao12 = calcAo(12);
  document.getElementById('statAo12').textContent = ao12 !== null ? fmt(ao12) : '—';

  renderSolves(best);
}

function renderSolves(best) {
  const list = document.getElementById('solvesList');
  if (!solves.length) {
    list.innerHTML = '<div class="empty-state"><span class="big">🧊</span>Noch keine Solves.<br>Halte die Leertaste gedrückt!</div>';
    return;
  }
  list.innerHTML = [...solves].reverse().map((s, ri) => {
    const i = solves.length - 1 - ri;
    const isBest = s.ms === best;
    return `
      <div class="solve-item ${isBest ? 'is-best' : ''}">
        <span class="solve-num">#${i+1}</span>
        <span class="solve-time">${fmt(s.ms)}</span>
        <button class="solve-delete" data-idx="${i}" title="Löschen">✕</button>
      </div>`;
  }).join('');

  list.querySelectorAll('.solve-delete').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const idx = parseInt(btn.dataset.idx);
      solves.splice(idx, 1);
      updateStats();
    });
  });
}

// ─── Ripple effect ────────────────────────────────────────────────────────────
function spawnRipple() {
  const r = document.createElement('div');
  r.className = 'ripple';
  const size = Math.max(window.innerWidth, window.innerHeight) * 2;
  r.style.cssText = `width:${size}px;height:${size}px;top:${window.innerHeight/2 - size/2}px;left:${window.innerWidth/2 - size/2}px`;
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 600);
}

// ─── Timer control ────────────────────────────────────────────────────────────
function startHold() {
  if (timerState === 'running') {
    stopTimer();
    return;
  }
  if (timerState !== 'idle') return;
  timerState = 'holding';
  holdDuration = 0;
  timerDisplay.classList.add('holding');
  timerHint.textContent = 'Loslassen zum Starten...';
  holdTimer = setTimeout(() => {
    if (timerState === 'holding') {
      timerState = 'ready';
      timerDisplay.classList.remove('holding');
      timerDisplay.classList.add('ready');
    }
  }, HOLD_THRESHOLD);
}

function releaseHold() {
  clearTimeout(holdTimer);
  if (timerState === 'ready') {
    timerDisplay.classList.remove('ready');
    if (inspectionEnabled) {
      startInspection();
    } else {
      startTimer();
    }
  } else if (timerState === 'holding') {
    timerState = 'idle';
    timerDisplay.classList.remove('holding');
    timerHint.textContent = 'Leertaste halten zum Starten';
  }
}

function startInspection() {
  timerState = 'inspection';
  inspectionSeconds = 15;
  timerDisplay.style.display = 'none';
  inspectionDisp.style.display = 'block';
  inspectionDisp.textContent = inspectionSeconds;
  timerHint.textContent = 'Inspektion läuft — Leertaste zum Starten';

  inspectionTimer = setInterval(() => {
    inspectionSeconds--;
    inspectionDisp.textContent = inspectionSeconds;
    if (inspectionSeconds <= 0) {
      clearInterval(inspectionTimer);
      endInspection();
    }
  }, 1000);
}

function endInspection() {
  inspectionDisp.style.display = 'none';
  timerDisplay.style.display = '';
  startTimer();
}

function startTimer() {
  timerState = 'running';
  startTime = Date.now();
  timerDisplay.classList.add('running');
  timerHint.textContent = 'Leertaste zum Stoppen';
  rafId = requestAnimationFrame(tick);
}

function stopTimer() {
  if (timerState !== 'running') return;
  cancelAnimationFrame(rafId);
  clearInterval(inspectionTimer);
  elapsed = Date.now() - startTime;
  timerState = 'idle';

  timerDisplay.classList.remove('running');
  timerDisplay.textContent = fmt(elapsed);
  timerHint.textContent = 'Leertaste halten zum Starten';
  inspectionDisp.style.display = 'none';
  timerDisplay.style.display = '';

  playClick();
  spawnRipple();

  solves.push({ ms: elapsed });
  updateStats();
  newScramble();
}

// ─── Keyboard ─────────────────────────────────────────────────────────────────
const keysDown = new Set();
document.addEventListener('keydown', e => {
  if (e.code !== 'Space') return;
  e.preventDefault();
  if (keysDown.has('Space')) return;
  keysDown.add('Space');

  if (timerState === 'inspection') {
    clearInterval(inspectionTimer);
    endInspection();
    return;
  }
  startHold();
});

document.addEventListener('keyup', e => {
  if (e.code !== 'Space') return;
  e.preventDefault();
  keysDown.delete('Space');
  releaseHold();
});

// ─── Touch ────────────────────────────────────────────────────────────────────
let touchActive = false;
function handleTouchStart(e) {
  e.preventDefault();
  touchActive = true;
  if (timerState === 'inspection') {
    clearInterval(inspectionTimer);
    endInspection();
    return;
  }
  startHold();
}
function handleTouchEnd(e) {
  e.preventDefault();
  if (!touchActive) return;
  touchActive = false;
  releaseHold();
}

touchZone.addEventListener('touchstart', handleTouchStart, { passive: false });
touchZone.addEventListener('touchend', handleTouchEnd, { passive: false });

// Also listen on main area for desktop touch
document.querySelector('.main').addEventListener('mousedown', e => {
  if (e.target.closest('button')) return;
  if (window.matchMedia('(max-width: 768px)').matches) return;
});

// ─── UI Controls ──────────────────────────────────────────────────────────────
inspectionToggle.addEventListener('click', () => {
  inspectionEnabled = !inspectionEnabled;
  inspectionToggle.classList.toggle('active', inspectionEnabled);
});

newScrambleBtn.addEventListener('click', newScramble);

clearBtn.addEventListener('click', () => {
  if (!solves.length) return;
  if (confirm('Alle Solves löschen?')) {
    solves = [];
    updateStats();
  }
});

// ─── Init ─────────────────────────────────────────────────────────────────────
newScramble();
updateStats();
</script>
</body>
</html>
